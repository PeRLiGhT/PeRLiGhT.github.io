<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Portfolio</title>
    <link rel="shortcut icon" href="./assets/images/logo.ico">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.cdnfonts.com/css/harry-potter" rel="stylesheet">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

<body style='margin : 0px;'>
    <div class="row" id="loadsection">
        <div class="loading-page page center">
            <div class="img-block">
                <div class="loader"></div>
            </div>
        </div>
    </div>

    <div class="row" id="waitload" style="display: none;">
        <div class="loading-page page center">
            <a id="showFadeInImage" href="/portfolio">
                <img class="fade-in-logo animate__animated animate__pulse animate__slow animate__infinite" src="./assets/images/slytherin-logo.png" alt="image" style="width: auto; max-width: 350px;"/>
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>

    <script>
        //---------------------------Reload when screen size change--------------------------------------------
        $(window).bind('resize', function(e)
        {
            this.location.reload(false);
        });

        //---------------------------show/hide section------------------------------------------
        waitload.style.display = "none";
        function hideElementAfterDelay(elementId) {
            setTimeout(function () {
                document.getElementById(elementId).style.display = 'none';
                waitload.style.display = "block";
            }, 2000);
        }
        hideElementAfterDelay('loadsection');

        // var bgm = document.getElementById('bgm');
        // bgm.play();

        //---------------------------check size for computer / mobile--------------------------------------------
        function isMobile() {
            return /Mobi|Android/i.test(navigator.userAgent);
        }

        if (isMobile()) {
            document.querySelectorAll('.page').forEach(function(page) {
                page.style.height = '100vh';
            });
        }
        else {
            document.querySelectorAll('.page').forEach(function(page) {
                page.style.height = '100vh';
            });
        } 

    </script>
</body>
</head>

</html>
