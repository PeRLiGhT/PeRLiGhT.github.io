<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Portfolio</title>
    <link rel="shortcut icon" href="./assets/images/logo.ico">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.cdnfonts.com/css/harry-potter" rel="stylesheet">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

<body style='margin : 0px;'>
    <div class="row fade-in-image" id="fadeIn">
        <div class="welcome-page page center">
            <div class="img-block">
                <div class="harry-font font-header glow">Portfolio</div>
                <div class="row-a">
                    <a class="harry-font font-select green mt-3 animate__animated animate__zoomIn" id="home-link" href="/home">
                        <span style="display: inline-block; margin-top: 10px;">Home</span>
                    </a>
                    <a class="harry-font font-select green mt-3 animate__animated animate__zoomIn" id="experience-link" href="/experience">
                        <span style="display: inline-block; margin-top: 10px;">Experience</span>
                    </a>
                    <a class="harry-font font-select green mt-3 animate__animated animate__zoomIn" id="contact-link" href="/contact">
                        <span style="display: inline-block; margin-top: 10px;">Contact</span>
                    </a>
                    <a class="harry-font font-select green mt-3 animate__animated animate__zoomIn" id="projects-link" href="/projects">
                        <span style="display: inline-block; margin-top: 10px;">Projects</span>
                    </a>
                </div>
                <div class="img-change center" id="change"></div>
            </div>
        </div>
    </div>

    <audio id="bgm" src="./assets/sounds/BGM.wav" preload="auto" autoplay loop></audio>
    <audio id="hoverSound" src="./assets/sounds/Button.mp3"></audio>
    <audio id="changeSound" src="./assets/sounds/change-image.wav"></audio>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>

    <script>
        //---------------------------Reload when screen size change--------------------------------------------
        $(window).bind('resize', function(e)
        {
            this.location.reload(false);
        });

        //---------------------------Hover text sound-------------------------------------------------------------
        const links = ['home-link', 'experience-link', 'contact-link', 'projects-link'];

        links.forEach(linkId => {
            document.getElementById(linkId).addEventListener('mouseenter', function() {
                hoverSound.currentTime = 0;
                hoverSound.play();
            });
        });

        //--------------------------Hover img sound-------------------------------------------------------------
        document.getElementById('change').addEventListener('mouseenter', function() {
            changeSound.currentTime = 0;
            changeSound.play();
        });

        //---------------------------check size for computer / mobile--------------------------------------------
        function isMobile() {
            return /Mobi|Android/i.test(navigator.userAgent);
        }

        if (isMobile()) {
            document.querySelectorAll('.page').forEach(function(page) {
                page.style.height = '100vh';
            });
            document.querySelector('.img-change').style.height = '256px';
            document.querySelector('.img-change').style.width = '192px';
        }
    //    else {
    //        document.querySelectorAll('.page').forEach(function(page) {
    //            page.style.height = '100vh';
    //        });
    //    } 

    </script>
</body>
</head>

</html>
